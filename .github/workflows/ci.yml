name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # 1. Vérification des secrets
  # ==========================================
  security:
    name: Audit Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Scan Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # 2. Qualité du code (Linting)
  # ==========================================
  lint:
    name: Code Quality (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        
      - name: Installation de uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Linting avec Ruff
        # uvx (uv tool run) exécute ruff sans même avoir besoin de l'installer dans le projet
        run: |
          uvx ruff format --check .
          uvx ruff check .

  # ==========================================
  # 3. Crash-test de la documentation (Sphinx + Furo)
  # ==========================================
  test-docs:
    name: Test Build Sphinx
    runs-on: ubuntu-latest
    needs: [security, lint] 
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
      
      - name: Installation de uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Synchronisation et Compilation
        # uv sync installe tout ce qui est dans pyproject.toml (incluant furo et sphinx)
        run: |
          pip install uv
          uv sync
          uv run make -C docs html

  # ==========================================
  # 4. Tests Unitaires (Pytest) 
  # ==========================================
  test:
    name: Unit Tests (Pytest)
    runs-on: ubuntu-latest
    needs: [security, lint]
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
      
      - name: Installation de uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          
      - name: Synchronisation de l'environnement
        run: uv sync --dev
        
      - name: Exécution des tests
        run: uv run pytest tests/