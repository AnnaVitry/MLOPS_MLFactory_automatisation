name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # ==========================================
  # 1. Vérification des secrets
  # ==========================================
  security:
    name: Audit Gitleaks
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: Scan Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ==========================================
  # 2. Qualité du code (Linting)
  # ==========================================
  lint:
    name: Code Quality (Ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
        
      - name: Installation de uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Linting avec Ruff
        # uvx (uv tool run) exécute ruff sans même avoir besoin de l'installer dans le projet
        run: |
          uvx ruff format --check .
          uvx ruff check .

  # ==========================================
  # 3. Crash-test de la documentation (Sphinx + Furo)
  # ==========================================
  test-docs:
    name: Test Build Sphinx
    runs-on: ubuntu-latest
    needs: [security, lint] 
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
      
      - name: Installation de uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Synchronisation et Compilation
        # uv sync installe tout ce qui est dans pyproject.toml (incluant furo et sphinx)
        run: |
          pip install uv
          uv sync --python 3.12
          uv run make -C docs html

# ==========================================
  # 4. Tests Unitaires & Intégration (Pytest) 
  # ==========================================
  test:
    name: Unit Tests (Pytest)
    runs-on: ubuntu-latest
    needs: [security, lint]
    steps:
      - name: Récupération du code
        uses: actions/checkout@v4
      
      - name: Installation de uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          
      - name: Synchronisation de l'environnement
        run: uv sync --dev --python 3.12

      - name: Allumage de l'infrastructure (Docker Compose)
        # On allume uniquement les services dont l'API et Celery ont besoin pour fonctionner
        run: |
          docker compose up -d --build db db minio rabbitmq redis mlflow
          
          # Pause de 15s pour laisser le temps à Postgres et RabbitMQ de s'initialiser
          echo "Attente du démarrage des services..."
          sleep 15 
          docker compose docker-compose.yml ps
        
      - name: Exécution des tests
        # On passe les variables d'environnement pour que pytest trouve l'infrastructure Docker locale
        env:
          POSTGRES_USER: mlflow
          POSTGRES_PASSWORD: mlflow
          POSTGRES_DB: mlflowdb
          MINIO_ROOT_USER: admin
          MINIO_ROOT_PASSWORD: password123
          MLFLOW_TRACKING_URI: http://localhost:5000
          MLFLOW_S3_ENDPOINT_URL: http://localhost:9000
          AWS_ACCESS_KEY_ID: admin
          AWS_SECRET_ACCESS_KEY: password123
          CELERY_BROKER_URL: amqp://guest:guest@localhost:5672//
          CELERY_RESULT_BACKEND: redis://localhost:6379/0
        run: uv run pytest tests/