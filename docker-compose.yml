services:
  # ==========================================
  # INFRASTRUCTURE MIN.IO (stockage)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
      MINIO_PROMETHEUS_AUTH_TYPE: public
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # ==========================================
  # INFRASTRUCTURE BUCKET (Cloud storage)
  # ==========================================
  createbuckets:
    image: minio/mc
    container_name: minio_setup
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'En attente du réveil de MinIO...';
        sleep 2;
      done;
      /usr/bin/mc mb myminio/mlflow --ignore-existing;
      echo 'Bucket mlflow configuré avec succès !';
      exit 0;
      "

  # ==========================================
  # INFRASTRUCTURE MLFLOW (comparateur models)
  # ==========================================
  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: mlflow_server
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    command: >
      mlflow server 
      --backend-store-uri sqlite:///mlflow.db 
      --default-artifact-root s3://mlflow/ 
      --host 0.0.0.0 
      --allowed-hosts "*"

  # ==========================================
  # INFRASTRUCTURE PREFECT
  # ==========================================
  database:
    image: postgres:15-alpine
    container_name: prefect_db
    restart: always
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prefect
    volumes:
      - db_data:/var/lib/postgresql/data

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: prefect_server
    restart: always
    depends_on:
      - database
    ports:
      - "4200:4200"
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:${POSTGRES_PASSWORD}@database:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_UI_API_URL: http://localhost:4200/api
    volumes:
      - prefect_data:/root/.prefect
    entrypoint: ["prefect", "server", "start"]

  # ==========================================
  # APPLICATION (API & Front)
  # ==========================================
  api:
    build:
      context: .                 # <-- Le contexte est la racine du projet
      dockerfile: ./src/api/Dockerfile # <-- Le chemin vers le Dockerfile
    container_name: ml_api
    depends_on:
      - mlflow
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
    deploy:
      resources:
        limits:
          memory: 512M
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - MODEL_NAME=${MODEL_NAME}
      - MODEL_ALIAS=${MODEL_ALIAS}

  front:
    build:
      context: .
      dockerfile: ./src/front/Dockerfile
    container_name: ml_front
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/predict
    volumes:
      - ./src/front:/app/src/front
      - ./data:/app/data

  # ==========================================
  # INFRASTRUCTURE MONITORING (Nouveau)
  # ==========================================
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    deploy:
      resources:
        limits:
          memory: 256M

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin # Tu pourras changer ce mot de passe
    deploy:
      resources:
        limits:
          memory: 256M
    depends_on:
      - prometheus

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: uptime_kuma
    ports:
      - "3001:3001"
    volumes:
      - uptime-kuma-data:/app/data
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  minio_data: 
  db_data:
  prefect_data:
  uptime-kuma-data: