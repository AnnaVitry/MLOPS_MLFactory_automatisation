services:
  # ==========================================
  # INFRASTRUCTURE MIN.IO (stockage)
  # ==========================================
  minio:
    image: minio/minio:latest
    container_name: minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      # On utilise les variables du .env
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
  # ==========================================
  # INFRASTRUCTURE BUCKET (Cloud storage)
  # ==========================================
  createbuckets:
    image: minio/mc
    container_name: minio_setup
    depends_on:
      - minio
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY}
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}; do
        echo 'En attente du réveil de MinIO...';
        sleep 2;
      done;
      /usr/bin/mc mb myminio/mlflow --ignore-existing;
      echo 'Bucket mlflow configuré avec succès !';
      exit 0;
      "
  # ==========================================
  # INFRASTRUCTURE MLFLOW (comparateur models)
  # ==========================================
  mlflow:
    image: ghcr.io/mlflow/mlflow
    container_name: mlflow_server
    depends_on:
      createbuckets:
        condition: service_completed_successfully
    ports:
      - "5000:5000"
    environment:
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000  # On garde l'URL en dur car elle est spécifique au réseau Docker
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID} # On utilise le .env pour les secrets
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
    command: >
      mlflow server 
      --backend-store-uri sqlite:///mlflow.db 
      --default-artifact-root s3://mlflow/ 
      --host 0.0.0.0 
      --allowed-hosts "*"

  # ==========================================
  # INFRASTRUCTURE PREFECT
  # ==========================================
  database:
    image: postgres:15-alpine
    container_name: prefect_db
    restart: always
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: prefect
    volumes:
      - db_data:/var/lib/postgresql/data

  prefect-server:
    image: prefecthq/prefect:3-latest
    container_name: prefect_server
    restart: always
    depends_on:
      - database
    ports:
      - "4200:4200"
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:${POSTGRES_PASSWORD}@database:5432/prefect
      PREFECT_SERVER_API_HOST: 0.0.0.0
      PREFECT_API_URL: http://prefect-server:4200/api
      PREFECT_UI_API_URL: http://localhost:4200/api
    volumes:
      - prefect_data:/root/.prefect
    entrypoint: ["prefect", "server", "start"]

  api:
    # build: .                            # Commenté pour forcer Docker à télécharger tes
    #   context: .                        # images en ligne en remplacent les 
    #   dockerfile: src/api/Dockerfile    # instructions build: par image:
    image: ghcr.io/annavitry/mlops_mlfactory-api:latest  # Remplace le build: par image:
    container_name: ml_api
    depends_on:
      - mlflow
    ports:
      - "8000:8000"
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MLFLOW_S3_ENDPOINT_URL=http://minio:9000
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}      # On utilise la syntaxe ${NOM_DE_LA_VARIABLE}
      - MODEL_NAME=${MODEL_NAME}
      - MODEL_ALIAS=${MODEL_ALIAS}

  front:
    # build: .                            # Commenté pour forcer Docker à télécharger tes
    #   context: .                        # images en ligne en remplacent les 
    #   dockerfile: src/front/Dockerfile  # instructions build: par image:
    image: ghcr.io/annavitry/mlops_mlfactory-front:latest # Remplace le build: par image:
    container_name: ml_front
    depends_on:
      - api
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000/predict
    volumes:
      - ./src/front:/app/src/front
      - ./data:/app/data

volumes:
  minio_data: 
  db_data:          # Ajout des volumes persistants pour Prefect sans toucher à l'existant
  prefect_data: